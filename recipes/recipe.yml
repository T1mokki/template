name: bazzite-custom
version: 44

base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: stable

modules:
  - type: files
    files:
      # Copies the udev rule from your repo to the correct system location
      - source: files/usr/lib/udev/rules.d
        destination: /usr/lib/udev/rules.d

  # The `akmods` module is a tool for managing and installing kernel modules built by Universal Blue.
  - type: akmods
    install:
      - hid-tmff2
