name: bazzite-custom
version: 44

base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: stable

modules:
  - type: files
    files:
      # The path inside your repo where the udev rule is stored
      - source: files/usr/lib/udev/rules.d
        destination: /usr/lib/udev/rules.d

  # The `akmods` module is the standard way to install additional kernel modules
  - type: akmods
    # The `akmods` module is a tool for managing and installing kernel modules built by Universal Blue[reference:3].
    install:
      - hid-tmff2
